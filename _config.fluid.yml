# ===================================================
# Fluid 主题配置文件 _config.fluid.yml
# 简约风格 · 适合个人博客
# 放在博客根目录（和 _config.yml 同级）
# ===================================================

# ----- 全局颜色方案 -----
color_scheme: auto              # auto = 跟随系统深色/浅色模式

# ----- 顶部导航栏 -----
navbar:
  blog_title: "Sojya"       # 左上角博客名，可改
  blog_title_url: "/"
  menu:
    - { key: "home",    link: "/",          icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "tag",     link: "/tags/",     icon: "iconfont icon-tag" }
    - { key: "about",   link: "/about/",    icon: "iconfont icon-user-fill" }
  search:
    enable: true
    path: /local-search.xml
    field: post
    content: true

# ----- 首页 -----
index:
  banner_img: ""                # 留空 = 无大图，更简约
  banner_img_height: 40         # 顶部高度，40 比较矮
  banner_mask_alpha: 0.3
  slogan:
    enable: false               # 关掉打字动效，更干净
  auto_excerpt:
    enable: true                # 自动截取摘要
    length: 120                 # 摘要字数

# ----- 文章页 -----
post:
  banner_img: ""
  banner_img_height: 30
  banner_mask_alpha: 0.3
  meta:
    author:
      enable: true
    date:
      enable: true
      format: "LL"              # 日期格式，如 2024年1月1日
    wordcount:
      enable: true              # 显示字数统计
      format: "{} 字"
    min2read:
      enable: true              # 显示阅读时长
      format: "{} 分钟"
    views:
      enable: false             # 不显示阅读量（需要第三方服务）
  toc:
    enable: true                # 开启文章目录（右侧）
    headingSelector: h1,h2,h3
    collapseDepth: 0
  copyright:
    enable: true                # 文章底部版权声明
    default: CC BY-NC-SA 4.0
  comments:
    enable: true               # 暂时关闭评论，需要时再开启

# ----- 归档页 -----
archive:
  banner_img: ""
  banner_img_height: 30
  banner_mask_alpha: 0.3

# ----- 分类页 -----
category:
  banner_img: ""
  banner_img_height: 30
  banner_mask_alpha: 0.3

# ----- 标签页 -----
tag:
  banner_img: ""
  banner_img_height: 30
  banner_mask_alpha: 0.3
  tagcloud:
    min_font: 15
    max_font: 25
    unit: px
    start_color: "#BBBBEE"
    end_color: "#337ab7"

# ----- 关于页 -----
about:
  banner_img: ""
  banner_img_height: 30
  banner_mask_alpha: 0.3
  avatar: ""     # 头像图片路径，如 /img/avatar.jpg
  name: "Sojya"
  intro: "记录 分享"        # 个人简介，可以改
  icons:                        # 社交链接（不需要的删掉）
    - { class: "iconfont icon-github-fill", link: "https://github.com/Sojya0205", tip: "GitHub" }

# ----- 404 页面 -----
page404:
  enable: true
  banner_img: ""
  banner_img_height: 30
  banner_mask_alpha: 0.3

# ----- 页脚 -----
footer:
  content: '由 <a href="https://hexo.io" target="_blank">Hexo</a> 驱动，主题 <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank">Fluid</a>'
  statistics:
    enable: true               # 关闭访问统计
  beian:
    enable: false               # 关闭备案信息（境外部署不需要）

# ----- 代码高亮 -----
code:
  copy_btn: true                # 代码块显示复制按钮
  highlight:
    enable: true
    lib: "highlightjs"
    highlightjs:
      style: "github"           # 简约的 GitHub 风格代码高亮
      bg_color: false

# ----- 图片懒加载 -----
lazyload:
  enable: true
  loading_img: ""
  onlypost: false

# ----- 内置搜索（本地搜索）-----
search:
  path: /local-search.xml
  field: post
  content: true
